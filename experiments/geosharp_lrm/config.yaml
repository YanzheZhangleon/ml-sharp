model:
  image_height: 544
  image_width: 960
  max_input_views: 32
  depth_min: 0.2
  depth_max: 500.0
  match_height: 68
  match_width: 120
  depth_bins: 64
  inverse_depth_bins: true
  geometry_backend: plane_sweep
  match_temperature: 0.05
  geo_feature_dim: 32
  patch_size: 8
  transformer_dim: 512
  transformer_heads: 8
  local_layers: 2
  global_layers: 12
  decoder_dim: 256
  gaussian_layers: 1
  xyz_residual_scale: 0.02
  scale_multiplier: 0.7
  opacity_bias: -2.0
  min_scale: 0.00001
  max_scale: 10.0

data:
  manifest_path: data/geosharp_manifest_train.json
  image_root: data
  val_manifest_path: data/geosharp_manifest_val.json
  val_image_root: data
  num_input_views: 8
  num_target_views: 2
  shuffle: true
  strict: true

loss:
  rgb_l1_weight: 1.0
  rgb_l2_weight: 0.2
  ssim_weight: 0.1
  opacity_weight: 0.0001
  scale_weight: 0.0001
  scale_anisotropy_weight: 0.00001
  background: white
  low_pass_filter_eps: 0.01
  target_chunk_size: 1

training:
  device: cuda
  seed: 42
  batch_size: 1
  num_workers: 8
  max_steps: 100000
  lr: 0.0002
  betas: [0.9, 0.95]
  weight_decay: 0.05
  amp: true
  amp_dtype: bf16
  grad_accum_steps: 1
  grad_clip_norm: 1.0
  log_every: 10
  save_every: 1000
  val_every: 2000
  val_batches: 16
  keep_last_checkpoints: 5
  resume: auto
  out_dir: experiments/geosharp_lrm/runs/base
  compile_model: false
  find_unused_parameters: false
